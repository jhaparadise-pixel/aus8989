    body {

      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-40px) scale(0.95); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.98); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3), 0 0 40px rgba(139, 92, 246, 0.2); }
      50% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.5), 0 0 60px rgba(139, 92, 246, 0.3); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    .fade-in {
      animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .slide-in {
      animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .pulse-animation {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    
    .glass-card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(51, 65, 85, 0.6));
      backdrop-filter: blur(20px) saturate(180%);
      border: 2px solid rgba(99, 102, 241, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.1), transparent);
      transition: left 0.5s;
    }
    
    .glass-card:hover::before {
      left: 100%;
    }
    
    .glass-card:hover {
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3),

                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transform: translateY(-5px);
    }
    
    .result-item {
      animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 4px solid #6366f1;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .result-item::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.1));
      transition: width 0.3s;
    }
    
    .result-item:hover::after {
      width: 100%;
    }
    
    .result-item:hover {
      transform: translateX(10px) scale(1.02);

      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

      position: relative;
      overflow: hidden;

    .stat-card::before {

      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;

      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .stat-card:hover::before {
      opacity: 1;
    }

      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.3),

      animation: glow 2s ease-in-out infinite;

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      text-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
      filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.3));
    }
    
    .btn-primary {

      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);

    }
    
    .btn-primary:active::before {

      height: 300px;
    }
    
    .btn-primary:hover:not(:disabled) {

    .btn-primary:active:not(:disabled) {

    }
    
    .btn-secondary {

      left: 50%;

      height: 0;

      border: 1px solid rgba(99, 102, 241, 0.2);

    .scroll-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);

    .scroll-container::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #818cf8, #a78bfa);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.7);

    label {

    .speed-toggle-slider {

      background: linear-gradient(135deg, #ec4899, #8b5cf6);

      transform: translateX(28px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);

  </style>

    let running = false;

        offlineCheckInterval = null;

      results.prepend(offlineDiv);
      
      setTimeout(() => {
        offlineDiv.remove();
      }, 5000);
    }

    function updateStats() {
      document.getElementById('tries').innerText = tries.toLocaleString();
      
      const now = Date.now();
      const diff = (now - lastTime) / 1000;
      if (diff >= 0.15) {
        const speedBoosterEnabled = document.getElementById('speedBooster').checked;
        
        let minSpeed, maxSpeed;
        if (speedBoosterEnabled) {
          minSpeed = 92;
          maxSpeed = 114;
        } else {
          minSpeed = 60;
          maxSpeed = 90;
        }
        
        const targetSpeed = Math.floor(Math.random() * (maxSpeed - minSpeed + 1)) + minSpeed;
        
        if (currentSpeed === 0) {
          currentSpeed = targetSpeed;
        } else {
          const speedDiff = targetSpeed - currentSpeed;
          currentSpeed += Math.sign(speedDiff) * Math.min(Math.abs(speedDiff), 5);
        }
        
        document.getElementById('speed').innerText = currentSpeed.toLocaleString();
        lastTime = now;
        lastTries = tries;
      }
    }
    
    function updateRuntime() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const hours = Math.floor(elapsed / 3600).toString().padStart(2, '0');
      const minutes = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
      const seconds = (elapsed % 60).toString().padStart(2, '0');
      document.getElementById('runtime').innerText = `${hours}:${minutes}:${seconds}`;
    }

    function generate() {
      const chain = document.getElementById('chain').value;
      const country = document.getElementById('country').value;
      const countryFlag = countryFlags[country] || '🌍';
      const keygenProcess = document.getElementById('keygenProcess');

      // Remove empty state
      const results = document.getElementById('results');

        results.innerHTML = '';

      // Clear keygen process empty state
      if (keygenProcess.querySelector('.opacity-50')) {
        keygenProcess.innerHTML = '';
      }

      function generateLoop() {
        if (!running) return;
        
        // Check network connection - stop if offline
        if (!navigator.onLine) {
          stopGeneration();
          showOfflineMessage();
          return;
        }
        
        // Generate addresses at a controlled pace
        for (let i = 0; i < 3; i++) {
          if (!running) break;
          
          tries++;
          
          let address = '', pk = '';

          try {
            if (chain === 'tron') {
              const acc = window.TronWeb.utils.accounts.generateAccount();
              address = acc.address.base58;
              pk = acc.privateKey;
            }

            if (chain === 'eth') {
              const wallet = ethers.Wallet.createRandom();
              address = wallet.address;
              pk = wallet.privateKey;
            }

            if (chain === 'btc') {
              const keyPair = bitcoinjs.ECPair.makeRandom();
              const { address: btcAddr } = bitcoinjs.payments.p2pkh({ pubkey: keyPair.publicKey });
              address = btcAddr;
              pk = keyPair.toWIF();
            }
            
            // Display private key in generation process
            if (pk) {
              const processLine = document.createElement('div');
              processLine.style.marginBottom = '4px';
              processLine.innerHTML = `<span style="color: #6366f1;">🔑</span> ${pk}`;
              keygenProcess.appendChild(processLine);
              
              // Keep only last 20 lines
              while (keygenProcess.children.length > 20) {
                keygenProcess.removeChild(keygenProcess.firstChild);
              }
              
              // Auto scroll to bottom
              keygenProcess.scrollTop = keygenProcess.scrollHeight;
            }
          } catch (error) {
            console.error('Generation error:', error);
            continue;
          }

                    📋 复制
                  </button>
                </div>
                <div class="mono-text" style="color: #22d3ee;">${address}</div>
              </div>
              <div>
                <div class="flex items-center justify-between mb-2">
                  <div class="text-xs font-semibold opacity-75">私钥</div>
                  <button id="${pkCopyId}" class="copy-btn px-3 py-1 rounded-lg text-xs font-bold transition-all" style="background: rgba(251, 113, 133, 0.1); color: #fb7185; border: 1px solid rgba(251, 113, 133, 0.3);">

                </div>
                <div class="mono-text" style="color: #fb7185;">${pk}</div>

    function copyToClipboard(text, button) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = button.innerHTML;
        button.innerHTML = '✓ 已复制';
        button.style.background = 'rgba(34, 197, 94, 0.2)';
        button.style.color = '#22c55e';

          button.style.color = '';
          button.style.borderColor = '';
        }, 2000);
      }).catch(err => {
        button.innerHTML = '❌ 失败';
        setTimeout(() => {
          button.innerHTML = '📋 复制';
        }, 2000);
      });
    }
